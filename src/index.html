<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>À-l-oree-du-fer</title>
  <link rel="shortcut icon" href="assets/images/LOGO-tete-seule.png" />

  <link rel="stylesheet" href="output.css" />
  <script src="index.js" defer></script>
</head>

<body class="bg-bg-color">
  <header>
    <section class=" w-full h-15 bg-black flex justify-end items-center gap-4 px-8">
      <div><a href="#contact" class=" text-white font-display text-2xl font-bold hover:text-primary border-r-2 pr-2"
          data-i18n="nav.contact">Contact</a>
      </div>

      <div class=" flex gap-4">
        <img src="assets/icons/france-svgrepo-com.svg" alt="drapeau français"
          class=" w-8 h-7 cursor-pointer hover:opacity-70 transition" onclick="setLang('fr')">

        <img src="assets/icons/united-kingdom-svgrepo-com.svg" alt="drapeau britannique"
          class=" w-8 h-7 cursor-pointer hover:opacity-70 transition" onclick="setLang('en')">
      </div>

    </section>
    <section class="w-full">
      <nav class="flex justify-around items-center my-4 w-full">
        <ul class="flex gap-8 items-center w-full justify-around">
          <li>
            <a href="#" class="nav-title" data-i18n="nav.home">Accueil</a>
          </li>
          <li>
            <a href="#" class="nav-title" data-i18n="nav.about">À propos</a>
          </li>
          <li><a href="#">
              <img src="assets/images/LOGO-tete-seule.png"
                alt="Logo A l'orée du fer, portrait de Luc Desessarts stylisé"
                class="h-20 w-20 hover:opacity-50 transition duration-200">
            </a></li>

          <li>
            <a href="#" class="nav-title" data-i18n="nav.projects">Mes chantiers</a>
          </li>
          <li>
            <a href="#" class="nav-title" data-i18n="nav.contact">Contact</a>
          </li>
        </ul>
      </nav>

    </section>
  </header>
  <main>
    <!-- Hero Carousel -->
    <section class="relative overflow-hidden h-screen">
      <!--Image de fond fixe et flouée-->
      <div class="absolute inset-0 bg-primary bg-cover bg-center scale-100">
      </div>

      <div class="relative z-10 h-full flex items-center justify-center">

        <!-- Track (slides) -->
        <div id="carousel-track" class="flex h-full w-3/4  transition-transform duration-1000 ease-in-out">
          <!-- Slide 1 -->
          <div
            class="min-w-full h-full overflow-hidden bg-[url(assets/images/hero-image.jpg)] bg-contain bg-center bg-no-repeat flex flex-col items-center justify-center pb-16 gap-5 px-6 text-center">
            <a href="#"
              class="mt-2 px-8 py-3 bg-primary text-secondary font-medium rounded-lg hover:bg-white/90 transition"
              data-i18n="btn.discover">
              Découvrir →
            </a>
          </div>

          <!-- Slide 2 -->
          <div
            class="min-w-full h-full overflow-hidden bg-[url(assets/images/tete-de-lit.jpg)] bg-contain bg-center bg-no-repeat flex flex-col items-center justify-center pb-16 gap-5 px-6 text-center">
            <a href="#"
              class="mt-2 px-8 py-3 bg-primary text-secondary font-medium rounded-lg hover:bg-white/90 transition"
              data-i18n="btn.collection">
              Voir la collection →
            </a>
          </div>
          <!-- Slide 3 -->
          <div
            class="min-w-full h-full bg-[url(assets/images/pergolas.jpg)] bg-contain bg-center bg-no-repeat flex flex-col items-center justify-center pb-16 gap-5 px-6 text-center">
            <a href="#"
              class="mt-2 px-8 py-3 bg-primary text-secondary font-medium rounded-lg hover:bg-white/90 transition"
              data-i18n="btn.contact">
              Nous contacter →
            </a>
          </div>
        </div>
      </div>

      <!-- Dots -->
      <div id="dots" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2"></div>

    </section>
  </main>
  <footer></footer>
</body>

</html>
